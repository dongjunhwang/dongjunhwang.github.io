short_bio: >-
  <p>
    I am currently a Ph.D. Student in the Department of Computer Science and Engineering at Sogang University,
    supervised by <a href="https://sites.google.com/site/junsukchoe/" target="_blank">Prof. Junsuk Choe</a>.
    Prior to this, I obtained my M.S. Degree in the Department of Artificial Intelligence at Sogang University
    advised by the same supervisor. Previously, I received a B.S. Degree at the same university.
  </p>
  <p>
    <strong>Research Interests</strong>: I research how to make vision-language models (VLMs) more scalable. 
    In particular, my work focuses on continually training VLMs on new datasets and 
    unlearning existing knowledge from VLMs without training them from scratch. 
    I also explore how to scale VLMs using imperfect datasets, 
    such as self-supervised, semi-supervised, weakly supervised, and few-shot learning datasets.
  </p>
  <p>
    <strong>My recent primary research question</strong> is to analyze how the scalability of VLMs affects vision-language-action models (VLAs).
  </p>

